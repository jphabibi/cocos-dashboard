<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cocos Capital — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0d1b2a; --navy2: #142033; --navy3: #1c2d45;
      --gold: #c9a84c; --gold2: #e2c068; --gold3: #f0d690;
      --em: #10b981; --em2: #34d399; --red: #ef4444; --red2: #f87171;
      --t1: #f0e6cc; --t2: #b0bec5; --t3: #78909c;
      --border: rgba(201,168,76,0.18); --border2: rgba(201,168,76,0.35);
      --glass: rgba(255,255,255,0.04);
    }
    html, body { height: 100%; background: var(--navy); color: var(--t1); font-family: 'Inter', sans-serif; }
    .pf { font-family: 'Playfair Display', serif; }

    /* TOPBAR */
    .topbar { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; background:var(--navy2); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50; }
    .brand { display:flex; align-items:center; gap:10px; }
    .bdot { width:28px; height:28px; background:var(--gold); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:14px; }
    .bname { font-family:'Playfair Display',serif; font-size:15px; color:var(--gold2); letter-spacing:.4px; }
    .tsw { display:flex; background:rgba(255,255,255,0.07); border-radius:8px; padding:3px; gap:2px; }
    .tbtn { padding:6px 14px; border-radius:6px; border:none; cursor:pointer; font-size:12px; font-weight:500; background:transparent; color:var(--t2); transition:all .2s; font-family:'Inter',sans-serif; }
    .tbtn.on { background:var(--gold); color:var(--navy); }

    /* FX BAR */
    .fxbar { padding:12px 20px; background:var(--navy3); border-bottom:1px solid var(--border); display:flex; flex-wrap:wrap; gap:10px; align-items:stretch; }
    .fxcard { flex:1; min-width:130px; background:var(--glass); border:1px solid var(--border); border-radius:10px; padding:10px 13px; }
    .fxpill { font-size:9px; padding:2px 8px; border-radius:10px; font-weight:600; display:inline-block; margin-bottom:5px; letter-spacing:.4px; }
    .pill-o { background:rgba(16,185,129,0.12); color:var(--em2); border:1px solid rgba(16,185,129,0.3); }
    .pill-m { background:rgba(14,165,233,0.15); color:#7dd3fc; border:1px solid rgba(14,165,233,0.3); }
    .fxlbl { font-size:10px; color:var(--gold3); margin-bottom:4px; font-weight:500; }
    .fxval { font-family:'Playfair Display',serif; font-size:20px; font-weight:600; color:var(--t1); }
    .fxsub { font-size:10px; color:var(--t2); margin-top:3px; }
    .fxinprow { display:flex; align-items:center; gap:6px; margin-top:8px; }
    .fxinprow input { background:rgba(255,255,255,0.08); border:1px solid var(--border2); border-radius:6px; padding:5px 8px; color:var(--t1); font-size:12px; width:90px; outline:none; font-family:'Inter',sans-serif; }
    .fxinprow input:focus { border-color:var(--gold); }
    .fxapply { background:var(--gold); color:var(--navy); border:none; border-radius:6px; padding:5px 11px; font-size:12px; font-weight:600; cursor:pointer; transition:.15s; }
    .fxapply:hover { background:var(--gold2); }
    .fxbrecha { flex:0 0 auto; background:var(--glass); border:1px solid var(--border); border-radius:10px; padding:10px 14px; text-align:center; min-width:95px; }
    .fxbval { font-family:'Playfair Display',serif; font-size:20px; font-weight:600; color:var(--gold2); }
    .fxmeta { flex:1; min-width:150px; display:flex; flex-direction:column; justify-content:space-between; gap:6px; }
    .fxhint { font-size:10px; color:var(--t3); line-height:1.5; }
    .fxts { font-size:9px; color:var(--t3); }
    .refbtn { background:transparent; border:1px solid var(--border2); color:var(--t2); border-radius:6px; padding:5px 12px; font-size:11px; cursor:pointer; font-family:'Inter',sans-serif; display:inline-flex; align-items:center; gap:5px; transition:.15s; }
    .refbtn:hover { background:rgba(255,255,255,0.06); }
    .spin { display:inline-block; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .fxloading { font-size:12px; color:var(--t3); font-style:italic; padding:14px 0; width:100%; }
    .fxerr { font-size:11px; color:var(--red2); }

    /* CLIENT HEADER */
    .clientbar { padding:12px 20px; background:var(--navy2); border-bottom:1px solid var(--border); }
    .clientname { font-family:'Playfair Display',serif; font-size:19px; }
    .clientname span { color:var(--gold2); }

    /* MAIN */
    .sec { padding:16px 20px; }
    .card { background:var(--glass); border:1px solid var(--border); border-radius:13px; padding:15px; }
    .cardg { border-color:var(--border2); }
    .g2 { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
    .mlb { font-size:10px; color:var(--t3); text-transform:uppercase; letter-spacing:.8px; margin-bottom:5px; }
    .mv { font-family:'Playfair Display',serif; font-size:21px; font-weight:600; }
    .mvsm { font-size:17px; }
    .msub { font-size:11px; color:var(--t2); margin-top:3px; }
    .pos { color:var(--em2); } .neg { color:var(--red2); }
    .stl { font-family:'Playfair Display',serif; font-size:14px; color:var(--gold3); margin-bottom:13px; letter-spacing:.2px; }

    /* INSTRUMENT ROWS */
    .irow { display:flex; align-items:center; gap:11px; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
    .irow:last-child { border-bottom:none; }
    .iic { width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .iin { flex:1; min-width:0; }
    .inm { font-size:13px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .itp { font-size:11px; color:var(--t3); margin-top:2px; }
    .inum { text-align:right; flex-shrink:0; }
    .ivl { font-size:13px; font-weight:600; }
    .ign { font-size:11px; margin-top:2px; }
    .pb { height:3px; background:rgba(255,255,255,0.08); border-radius:2px; margin-top:5px; overflow:hidden; }
    .pf2 { height:100%; border-radius:2px; transition:width 1s ease; }

    /* INSIGHTS */
    .ins { background:rgba(201,168,76,0.07); border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:8px; }
    .it { font-size:13px; color:var(--t2); line-height:1.6; }

    /* ADMIN ROWS */
    .arow { display:flex; align-items:center; gap:9px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
    .arow:last-child { border-bottom:none; }
    .scr { max-height:270px; overflow-y:auto; }
    .cwrap { position:relative; width:100%; height:210px; }
    .lgi { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--t2); }
    .lgd { width:9px; height:9px; border-radius:2px; flex-shrink:0; }
    .empty { text-align:center; padding:26px; color:var(--t3); font-size:12px; }

    /* BUTTONS */
    .btn { padding:8px 15px; border-radius:7px; border:none; cursor:pointer; font-size:12px; font-weight:500; font-family:'Inter',sans-serif; transition:.18s; }
    .btng { background:var(--gold); color:var(--navy); } .btng:hover { background:var(--gold2); }
    .btngh { background:transparent; color:var(--t2); border:1px solid var(--border2); } .btngh:hover { background:rgba(255,255,255,0.06); }
    .btnd { background:rgba(239,68,68,0.2); color:var(--red2); border:1px solid rgba(239,68,68,0.3); } .btnd:hover { background:rgba(239,68,68,0.35); }
    .btnsm { padding:5px 10px; font-size:11px; }
    .finput { width:100%; background:rgba(255,255,255,0.06); border:1px solid var(--border2); border-radius:6px; padding:7px 10px; color:var(--t1); font-size:12px; outline:none; margin-bottom:10px; font-family:'Inter',sans-serif; }
    .finput:focus { border-color:var(--gold); }
    .flabel { font-size:11px; color:var(--t2); display:block; margin-bottom:4px; }

    /* MODAL */
    .moverlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px; }
    .modal { background:var(--navy2); border:1px solid var(--border2); border-radius:13px; padding:20px; width:100%; max-width:380px; max-height:90vh; overflow-y:auto; }
    .mtitle { font-family:'Playfair Display',serif; font-size:16px; color:var(--gold2); margin-bottom:15px; }

    /* BOLETA */
    .boleta-notice { background:rgba(201,168,76,0.08); border:1px solid var(--border2); border-radius:10px; padding:13px 15px; font-size:12px; color:var(--t2); line-height:1.7; }
    .boleta-notice strong { color:var(--gold2); }
    .boleta-notice code { background:rgba(255,255,255,0.08); border-radius:4px; padding:2px 6px; font-size:11px; color:var(--gold3); }

    @media (max-width:600px) {
      .g2 { grid-template-columns:1fr; }
      .mv { font-size:18px; }
      .fxcard { min-width:100%; }
      .fxmeta { min-width:100%; }
    }
  </style>
</head>
<body>

<div id="app">
  <div class="topbar">
    <div class="brand">
      <div class="bdot">◈</div>
      <span class="bname">Cocos Capital</span>
    </div>
    <div class="tsw">
      <button class="tbtn on" id="btnA" onclick="sw('a')">Asesor</button>
      <button class="tbtn" id="btnC" onclick="sw('c')">Cliente</button>
    </div>
  </div>

  <div id="fxzone">
    <div class="fxbar"><span class="fxloading"><span class="spin">↻</span> Cargando cotizaciones en vivo...</span></div>
  </div>

  <div id="vA"></div>
  <div id="vC" style="display:none"></div>
  <div id="modalOverlay" class="moverlay" style="display:none"></div>
</div>

<script>
const TIPOS = {
  FCI:         { label:'Fondo de Inversión',      e:'🏦', c:'#7c3aed', bg:'rgba(124,58,237,0.18)' },
  CEDEAR:      { label:'CEDEAR',                  e:'🌎', c:'#0ea5e9', bg:'rgba(14,165,233,0.18)' },
  ON:          { label:'Obligación Negociable',   e:'📄', c:'#f59e0b', bg:'rgba(245,158,11,0.18)' },
  Acciones:    { label:'Acción',                  e:'📈', c:'#10b981', bg:'rgba(16,185,129,0.18)' },
  'Plazo Fijo':{ label:'Plazo Fijo',              e:'🔒', c:'#c9a84c', bg:'rgba(201,168,76,0.18)' },
  Crypto:      { label:'Crypto',                  e:'🔷', c:'#f97316', bg:'rgba(249,115,22,0.18)' },
  Obligaciones:{ label:'Obligación',              e:'📑', c:'#ec4899', bg:'rgba(236,72,153,0.18)' }
};

let portfolio = [
  { id:1, nombre:'Balanz Capital Ahorro',    tipo:'FCI',         cantidad:5000, pc:1.85,   pa:2.12,   mon:'ARS', fecha:'2024-11-01' },
  { id:2, nombre:'MercadoLibre (MELI)',      tipo:'CEDEAR',      cantidad:10,   pc:42500,  pa:48900,  mon:'ARS', fecha:'2024-10-15' },
  { id:3, nombre:'Loma Negra ON 2026',       tipo:'ON',          cantidad:1000, pc:98.5,   pa:103.2,  mon:'USD', fecha:'2024-09-20' },
  { id:4, nombre:'YPF Acciones',             tipo:'Acciones',    cantidad:200,  pc:18200,  pa:21650,  mon:'ARS', fecha:'2024-12-01' },
  { id:5, nombre:'Plazo Fijo Banco Galicia', tipo:'Plazo Fijo',  cantidad:1,    pc:500000, pa:557500, mon:'ARS', fecha:'2024-12-10' },
];
let nid = 6, curView = 'a', pieC = null;
let fx = { ofCompra:null, ofVenta:null, mepCompra:null, mepVenta:null, src:null, ts:null, ok:false };

/* ---- UTILS ---- */
function fxUSD() { return fx.mepVenta || fx.ofVenta || 1200; }
function fmtN(n, d=0, pre='') {
  if (n == null || isNaN(n)) return '—';
  return pre + Number(n).toLocaleString('es-AR', { minimumFractionDigits:d, maximumFractionDigits:d });
}
function fmtTS(d) {
  if (!d) return '';
  return d.toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
}

/* ---- FX LIVE ---- */
async function loadFX(showSpin = true) {
  if (showSpin) {
    const z = document.getElementById('fxzone');
    if (z) z.innerHTML = '<div class="fxbar"><span class="fxloading"><span class="spin">↻</span> Actualizando cotizaciones...</span></div>';
  }
  try {
    const res = await fetch('/api/cotizaciones');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    fx.ofCompra  = data.oficial.compra;
    fx.ofVenta   = data.oficial.venta;
    fx.mepCompra = data.mep.compra;
    fx.mepVenta  = data.mep.venta;
    fx.ts  = new Date();
    fx.ok  = true;
  } catch(e) {
    fx.ok = false;
  }
  renderFXBar();
  if (curView === 'c') renderClient(); else renderAdvisor();
}

function renderFXBar() {
  const z = document.getElementById('fxzone');
  if (!z) return;
  if (!fx.ok) {
    z.innerHTML = `<div class="fxbar" style="justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <span class="fxerr">⚠ No se pudieron obtener cotizaciones. Ingresalas manualmente.</span>
      <button class="refbtn" onclick="loadFX()"><span>↻</span> Reintentar</button>
    </div>`;
    // fallback: mostrar inputs manuales
    renderFXBarManual();
    return;
  }
  const brecha = fx.ofVenta ? ((fx.mepVenta - fx.ofVenta) / fx.ofVenta * 100).toFixed(1) + '%' : '—';
  const ts = fx.ts ? fmtTS(fx.ts) : '';
  z.innerHTML = `<div class="fxbar">
    <div class="fxcard">
      <div><span class="fxpill pill-o">Oficial · Banco Nación</span></div>
      <div class="fxlbl">Dólar Oficial</div>
      <div class="fxval">${fmtN(fx.ofVenta, 2, '$')}</div>
      <div class="fxsub">Compra ${fmtN(fx.ofCompra, 2, '$')} &nbsp;·&nbsp; Venta ${fmtN(fx.ofVenta, 2, '$')}</div>
      <div class="fxinprow">
        <input type="number" id="inOfC" value="${fx.ofCompra}" step="0.01" placeholder="Compra">
        <input type="number" id="inOfV" value="${fx.ofVenta}"  step="0.01" placeholder="Venta">
        <button class="fxapply" onclick="applyFX('of')">✓</button>
      </div>
    </div>
    <div class="fxcard">
      <div><span class="fxpill pill-m">MEP · Mercado</span></div>
      <div class="fxlbl">Dólar MEP (Bolsa)</div>
      <div class="fxval">${fmtN(fx.mepVenta, 2, '$')}</div>
      <div class="fxsub">Compra ${fmtN(fx.mepCompra, 2, '$')} &nbsp;·&nbsp; Venta ${fmtN(fx.mepVenta, 2, '$')}</div>
      <div class="fxinprow">
        <input type="number" id="inMepC" value="${fx.mepCompra}" step="0.01" placeholder="Compra">
        <input type="number" id="inMepV" value="${fx.mepVenta}"  step="0.01" placeholder="Venta">
        <button class="fxapply" onclick="applyFX('mep')">✓</button>
      </div>
    </div>
    <div class="fxbrecha">
      <div style="font-size:10px;color:var(--t3);margin-bottom:4px">Brecha</div>
      <div class="fxbval">${brecha}</div>
      <div style="font-size:10px;color:var(--t2);margin-top:3px">MEP vs Oficial</div>
    </div>
    <div class="fxmeta">
      <button class="refbtn" id="refBtn" onclick="reloadFX()"><span id="refIcon">↻</span> Actualizar</button>
      <div class="fxts">
        🟢 En vivo · dolarapi.com &nbsp;·&nbsp; Actualizado ${ts}
      </div>
    </div>
  </div>`;
}

function renderFXBarManual() {
  // Append manual inputs below the error
  const z = document.getElementById('fxzone');
  if (!z) return;
  z.innerHTML += `<div class="fxbar" style="padding-top:0;border-top:none">
    <div class="fxcard">
      <div><span class="fxpill pill-o">Oficial · Manual</span></div>
      <div class="fxlbl">Dólar Oficial</div>
      <div class="fxinprow">
        <input type="number" id="inOfC" value="${fx.ofCompra||''}" step="0.01" placeholder="Compra">
        <input type="number" id="inOfV" value="${fx.ofVenta||''}"  step="0.01" placeholder="Venta">
        <button class="fxapply" onclick="applyFX('of')">✓</button>
      </div>
    </div>
    <div class="fxcard">
      <div><span class="fxpill pill-m">MEP · Manual</span></div>
      <div class="fxlbl">Dólar MEP</div>
      <div class="fxinprow">
        <input type="number" id="inMepC" value="${fx.mepCompra||''}" step="0.01" placeholder="Compra">
        <input type="number" id="inMepV" value="${fx.mepVenta||''}"  step="0.01" placeholder="Venta">
        <button class="fxapply" onclick="applyFX('mep')">✓</button>
      </div>
    </div>
  </div>`;
}

async function reloadFX() {
  const ic = document.getElementById('refIcon');
  if (ic) { ic.classList.add('spin'); }
  await loadFX(false);
  const ic2 = document.getElementById('refIcon');
  if (ic2) ic2.classList.remove('spin');
}

function applyFX(t) {
  if (t === 'of') {
    const c = parseFloat(document.getElementById('inOfC')?.value);
    const v = parseFloat(document.getElementById('inOfV')?.value);
    if (!isNaN(c) && c > 0) fx.ofCompra = c;
    if (!isNaN(v) && v > 0) fx.ofVenta = v;
  } else {
    const c = parseFloat(document.getElementById('inMepC')?.value);
    const v = parseFloat(document.getElementById('inMepV')?.value);
    if (!isNaN(c) && c > 0) fx.mepCompra = c;
    if (!isNaN(v) && v > 0) fx.mepVenta = v;
  }
  fx.ts = new Date(); fx.ok = true;
  renderFXBar();
  if (curView === 'c') renderClient(); else renderAdvisor();
}

/* ---- AUTO REFRESH cada 5 minutos ---- */
setInterval(() => loadFX(false), 5 * 60 * 1000);

/* ---- SWITCH ---- */
function sw(v) {
  curView = v;
  document.getElementById('vA').style.display = v === 'a' ? 'block' : 'none';
  document.getElementById('vC').style.display = v === 'c' ? 'block' : 'none';
  document.getElementById('btnA').classList.toggle('on', v === 'a');
  document.getElementById('btnC').classList.toggle('on', v === 'c');
  if (v === 'c') renderClient(); else renderAdvisor();
}

/* ---- CALC ---- */
function calcI(item) {
  const inv = item.cantidad * item.pc, act = item.cantidad * item.pa;
  return { inv, act, gan: act - inv, pct: ((item.pa - item.pc) / item.pc) * 100 };
}
function calcTotals() {
  let ti = 0, ta = 0;
  portfolio.forEach(i => { const c = calcI(i), f = i.mon === 'USD' ? fxUSD() : 1; ti += c.inv * f; ta += c.act * f; });
  return { ti, ta, gan: ta - ti, pct: ti ? ((ta - ti) / ti) * 100 : 0 };
}
function getDistrib() {
  const m = {};
  portfolio.forEach(i => { const c = calcI(i), f = i.mon === 'USD' ? fxUSD() : 1; m[i.tipo] = (m[i.tipo] || 0) + c.act * f; });
  return m;
}
function getDivMsg() {
  const s = new Set(portfolio.map(i => i.tipo));
  if (!portfolio.length) return 'Sin inversiones cargadas.';
  if (s.size === 1) return '⚠️ Todo en un solo tipo. Considerá diversificar.';
  if (s.size === 2) return '📊 Algo diversificada. Podría mejorar.';
  return '✅ Bien diversificada en ' + s.size + ' tipos.';
}
function getInsights() {
  return portfolio.slice(0, 3).map(item => {
    const c = calcI(item), t = TIPOS[item.tipo] || TIPOS.FCI;
    if (c.pct >= 10) return `${t.e} <strong>${item.nombre}</strong> creció un <strong class="pos">+${c.pct.toFixed(1)}%</strong> 🚀`;
    if (c.pct < 0)   return `${t.e} <strong>${item.nombre}</strong> está en <strong class="neg">${c.pct.toFixed(1)}%</strong>. Lo revisamos juntos.`;
    return `${t.e} <strong>${item.nombre}</strong> va estable con <strong class="pos">+${c.pct.toFixed(1)}%</strong>.`;
  });
}

/* ---- ADVISOR VIEW ---- */
function renderAdvisor() {
  const el = document.getElementById('vA');
  const rows = portfolio.map(item => {
    const c = calcI(item), t = TIPOS[item.tipo] || TIPOS.FCI;
    const fv = item.mon === 'USD' ? fxUSD() : 1;
    return `<div class="arow">
      <div style="width:32px;height:32px;border-radius:8px;background:${t.bg};display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${t.e}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.nombre}</div>
        <div style="font-size:10px;color:var(--t3)">${item.tipo} · ${item.mon} · x${item.cantidad}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;margin-right:10px">
        <div style="font-size:12px;color:var(--t2)">${fmtN(c.act, 2, item.mon === 'USD' ? 'USD ' : '$')}</div>
        ${item.mon === 'USD' ? `<div style="font-size:10px;color:var(--t3)">≈ ${fmtN(c.act * fv, 0, '$')}</div>` : ''}
        <div style="font-size:11px" class="${c.pct >= 0 ? 'pos' : 'neg'}">${c.pct >= 0 ? '+' : ''}${c.pct.toFixed(1)}%</div>
      </div>
      <div style="display:flex;gap:5px;flex-shrink:0">
        <button class="btn btngh btnsm" onclick="openEdit(${item.id})">✏</button>
        <button class="btn btnd btnsm" onclick="delItem(${item.id})">✕</button>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="sec">
      <div class="stl">Cartera actual — Sofía Habibi</div>
      <div class="card cardg scr">${!portfolio.length ? '<div class="empty">Sin instrumentos cargados.</div>' : rows}</div>
    </div>
    <div class="sec" style="padding-top:0">
      <div class="stl">Instrucciones para cargar boletas</div>
      <div class="boleta-notice">
        💡 <strong>Flujo recomendado:</strong> Adjuntá el PDF o imagen de la boleta en el chat de Claude y escribí <code>interpretar boleta</code>. Claude extrae los datos y los podés cargar acá manualmente o usando el formulario de abajo.
      </div>
    </div>
    <div class="sec" style="padding-top:0">
      <div class="stl">Agregar instrumento</div>
      <div class="card">
        <div class="g2">
          <div><label class="flabel">Nombre</label><input class="finput" type="text" id="fn" placeholder="Ej: YPF Acciones"></div>
          <div><label class="flabel">Tipo</label><select class="finput" id="ft" style="margin-bottom:10px">${Object.keys(TIPOS).map(k => `<option value="${k}">${TIPOS[k].label}</option>`).join('')}</select></div>
          <div><label class="flabel">Cantidad</label><input class="finput" type="number" id="fc" placeholder="10" min="0"></div>
          <div><label class="flabel">Moneda</label><select class="finput" id="fm" style="margin-bottom:10px"><option value="ARS">ARS – Pesos</option><option value="USD">USD – Dólares</option></select></div>
          <div><label class="flabel">Precio de compra</label><input class="finput" type="number" id="fpc" placeholder="18200" min="0"></div>
          <div><label class="flabel">Precio actual</label><input class="finput" type="number" id="fpa" placeholder="21650" min="0"></div>
        </div>
        <label class="flabel">Fecha de compra</label>
        <input class="finput" type="date" id="ff" style="width:auto">
        <div style="margin-top:8px;display:flex;gap:8px">
          <button class="btn btng" onclick="addItem()">+ Agregar</button>
          <button class="btn btngh" onclick="clearF()">Limpiar</button>
        </div>
      </div>
    </div>`;
}

function openEdit(id) {
  const item = portfolio.find(i => i.id === id); if (!item) return;
  const ov = document.getElementById('modalOverlay');
  ov.style.display = 'flex';
  ov.innerHTML = `<div class="modal">
    <div class="mtitle">✏ Editar instrumento</div>
    <label class="flabel">Nombre</label><input class="finput" type="text" id="en" value="${item.nombre}">
    <label class="flabel">Tipo</label><select class="finput" id="et" style="margin-bottom:10px">${Object.keys(TIPOS).map(k => `<option value="${k}" ${k === item.tipo ? 'selected' : ''}>${TIPOS[k].label}</option>`).join('')}</select>
    <label class="flabel">Cantidad</label><input class="finput" type="number" id="ec" value="${item.cantidad}">
    <div class="g2">
      <div><label class="flabel">Precio compra</label><input class="finput" type="number" id="epc" value="${item.pc}"></div>
      <div><label class="flabel">Precio actual</label><input class="finput" type="number" id="epa" value="${item.pa}"></div>
    </div>
    <label class="flabel">Moneda</label><select class="finput" id="em" style="margin-bottom:10px"><option value="ARS" ${item.mon === 'ARS' ? 'selected' : ''}>ARS</option><option value="USD" ${item.mon === 'USD' ? 'selected' : ''}>USD</option></select>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btng" onclick="saveEdit(${id})">Guardar</button>
      <button class="btn btngh" onclick="closeModal()">Cancelar</button>
    </div>
  </div>`;
}
function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
function saveEdit(id) {
  const item = portfolio.find(i => i.id === id); if (!item) return;
  item.nombre   = document.getElementById('en').value;
  item.tipo     = document.getElementById('et').value;
  item.cantidad = parseFloat(document.getElementById('ec').value)  || item.cantidad;
  item.pc       = parseFloat(document.getElementById('epc').value) || item.pc;
  item.pa       = parseFloat(document.getElementById('epa').value) || item.pa;
  item.mon      = document.getElementById('em').value;
  closeModal(); renderAdvisor();
}
function addItem() {
  const n = document.getElementById('fn').value.trim();
  const t = document.getElementById('ft').value;
  const c = parseFloat(document.getElementById('fc').value);
  const m = document.getElementById('fm').value;
  const pc = parseFloat(document.getElementById('fpc').value);
  const pa = parseFloat(document.getElementById('fpa').value);
  const f = document.getElementById('ff').value;
  if (!n || !c || !pc || !pa) { alert('Completá todos los campos obligatorios.'); return; }
  portfolio.push({ id: nid++, nombre:n, tipo:t, cantidad:c, pc, pa, mon:m, fecha: f || new Date().toISOString().slice(0,10) });
  clearF(); renderAdvisor();
}
function clearF() { ['fn','fc','fpc','fpa','ff'].forEach(id => { const e = document.getElementById(id); if(e) e.value = ''; }); }
function delItem(id) { if (!confirm('¿Eliminar este instrumento?')) return; portfolio = portfolio.filter(i => i.id !== id); renderAdvisor(); }

/* ---- CLIENT VIEW ---- */
function renderClient() {
  const el = document.getElementById('vC');
  const tot = calcTotals();
  const dist = getDistrib();
  const ins = getInsights();

  const irows = portfolio.map(item => {
    const c = calcI(item), t = TIPOS[item.tipo] || TIPOS.FCI;
    const fv = item.mon === 'USD' ? fxUSD() : 1;
    const mx = Math.max(...portfolio.map(i => calcI(i).act * (i.mon === 'USD' ? fxUSD() : 1)));
    const bp = mx ? ((c.act * fv) / mx * 100).toFixed(0) : '0';
    const ms = item.mon === 'USD' ? 'USD ' : 'ARS ';
    return `<div class="irow">
      <div class="iic" style="background:${t.bg}">${t.e}</div>
      <div class="iin">
        <div class="inm">${item.nombre}</div>
        <div class="itp">${t.label} · ${item.mon}</div>
        <div class="pb"><div class="pf2" style="width:${bp}%;background:${t.c}"></div></div>
      </div>
      <div class="inum">
        <div class="ivl">${fmtN(c.act, 2, ms)}</div>
        <div class="ign ${c.pct >= 0 ? 'pos' : 'neg'}">${c.pct >= 0 ? '▲' : '▼'} ${Math.abs(c.pct).toFixed(1)}%</div>
        <div style="font-size:10px;color:var(--t3)">${c.gan >= 0 ? '+' : ''}${fmtN(c.gan, 0, ms)}</div>
      </div>
    </div>`;
  }).join('');

  const lgHtml = Object.entries(dist).map(([k, v]) => {
    const t = TIPOS[k] || TIPOS.FCI;
    const pct = tot.ta ? ((v / tot.ta) * 100).toFixed(0) : '0';
    return `<div class="lgi"><div class="lgd" style="background:${t.c}"></div>${k} ${pct}%</div>`;
  }).join('');

  el.innerHTML = `
    <div class="clientbar"><div class="clientname">Cliente: <span>Sofía Habibi</span></div></div>
    <div class="sec">
      <div style="font-size:10px;color:var(--t3);margin-bottom:11px">
        Tipo de cambio MEP utilizado: ${fmtN(fx.mepVenta, 2, '$')} &nbsp;·&nbsp; ${fx.ts ? '🟢 En vivo · ' + fmtTS(fx.ts) : '⚪ Sin datos en vivo'}
      </div>
      <div class="g2" style="margin-bottom:11px">
        <div class="card cardg"><div class="mlb">Capital invertido</div><div class="mv pf">${fmtN(tot.ti, 0, 'ARS ')}</div><div class="msub">En pesos equivalentes</div></div>
        <div class="card cardg"><div class="mlb">Valor hoy</div><div class="mv pf">${fmtN(tot.ta, 0, 'ARS ')}</div><div class="msub">Con tipo de cambio actual</div></div>
      </div>
      <div class="g2">
        <div class="card" style="background:${tot.gan >= 0 ? 'rgba(16,185,129,0.08)' : 'rgba(239,68,68,0.08)'};border-color:${tot.gan >= 0 ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)'}">
          <div class="mlb">Ganancia / Pérdida</div>
          <div class="mv mvsm pf ${tot.gan >= 0 ? 'pos' : 'neg'}">${tot.gan >= 0 ? '+' : ''}${fmtN(Math.abs(tot.gan), 0, 'ARS ')}</div>
          <div class="msub ${tot.gan >= 0 ? 'pos' : 'neg'}">${tot.pct >= 0 ? '+' : ''}${tot.pct.toFixed(2)}%</div>
        </div>
        <div class="card" style="background:rgba(201,168,76,0.06);border-color:var(--border2)">
          <div class="mlb">Diversificación</div>
          <div style="font-size:12px;color:var(--t2);margin-top:7px;line-height:1.5">${getDivMsg()}</div>
        </div>
      </div>
    </div>
    <div class="sec" style="padding-top:0">
      <div class="stl">Distribución de tu cartera</div>
      <div class="card cardg">
        <div class="cwrap"><canvas id="pieC"></canvas></div>
        <div style="display:flex;flex-wrap:wrap;gap:7px 14px;margin-top:12px">${lgHtml}</div>
      </div>
    </div>
    <div class="sec" style="padding-top:0">
      <div class="stl">Tus inversiones en detalle</div>
      <div class="card cardg">${!portfolio.length ? '<div class="empty">Sin inversiones cargadas.</div>' : irows}</div>
    </div>
    <div class="sec" style="padding-top:0">
      <div class="stl">¿Cómo va tu plata?</div>
      ${ins.length ? ins.map(i => `<div class="ins"><p class="it">${i}</p></div>`).join('') : '<div class="empty">Cargá instrumentos para ver análisis.</div>'}
    </div>`;

  setTimeout(() => {
    const ctx = document.getElementById('pieC'); if (!ctx) return;
    if (pieC) { pieC.destroy(); pieC = null; }
    const labs = Object.keys(dist), dat = Object.values(dist), cols = labs.map(k => (TIPOS[k] || TIPOS.FCI).c);
    pieC = new Chart(ctx, {
      type: 'doughnut',
      data: { labels: labs, datasets: [{ data: dat, backgroundColor: cols, borderColor: '#142033', borderWidth: 2, hoverOffset: 6 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` ${c.label}: ARS ${Math.round(c.raw).toLocaleString('es-AR')}` } } },
        cutout: '62%'
      }
    });
  }, 80);
}

/* ---- INIT ---- */
renderAdvisor();
loadFX();
</script>
</body>
</html>
